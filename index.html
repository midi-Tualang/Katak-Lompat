<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Katak Melompat</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(#87CEEB, #4CAF50);
    font-family: Arial;
    overflow: hidden;
  }
  #game {
    position: relative;
    width: 100%;
    height: 300px;
    background: #4CAF50;
    border-top: 4px solid #2e7d32;
  }
  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #2e7d32;
  }
  #frog {
    position: absolute;
    bottom: 60px;
    left: 60px;
    width: 50px;
    height: 40px;
    background: #66bb6a;
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 0 3px #388e3c inset;
  }
  #frog::before, #frog::after {
    content: "";
    position: absolute;
    top: -10px;
    width: 14px;
    height: 14px;
    background: #a5d6a7;
    border-radius: 50%;
    border: 2px solid #2e7d32;
  }
  #frog::before { left: 5px; }
  #frog::after { right: 5px; }

  .obstacle {
    position: absolute;
    bottom: 60px;
    width: 40px;
    height: 60px;
    background: #5d4037;
    border-radius: 10px;
  }
  .tree-top {
    position: absolute;
    bottom: 50px;
    left: -10px;
    width: 60px;
    height: 40px;
    background: #2e7d32;
    border-radius: 50%;
  }

  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.8);
    border-radius: 6px;
    font-weight: bold;
  }

  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 15px 20px;
    border-radius: 8px;
    text-align: center;
    display: none;
  }
  #message button {
    margin-top: 10px;
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    background: #ffeb3b;
    cursor: pointer;
    font-weight: bold;
  }

  #controls {
    margin: 10px;
    text-align: center;
    color: #fff;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="controls">Tekan SPACE atau klik untuk melompat 🐸</div>

<div id="game">
  <div id="score">Skor: 0</div>
  <div id="frog"></div>
  <div id="ground"></div>

  <div id="message">
    <div id="message-text"></div>
    <button id="restart">Main Lagi</button>
  </div>
</div>

<script>
  const game = document.getElementById("game");
  const frog = document.getElementById("frog");
  const scoreEl = document.getElementById("score");
  const messageBox = document.getElementById("message");
  const messageText = document.getElementById("message-text");
  const restartBtn = document.getElementById("restart");

  let isJumping = false;
  let velocityY = 0;
  let gravity = -0.6;
  let jumpStrength = 10;
  let frogY = 0;
  let obstacles = [];
  let gameSpeed = 3;
  let score = 0;
  let gameOver = false;

  function createObstacle() {
    const obstacle = document.createElement("div");
    obstacle.classList.add("obstacle");

    if (Math.random() > 0.5) {
      const treeTop = document.createElement("div");
      treeTop.classList.add("tree-top");
      obstacle.appendChild(treeTop);
    }

    obstacle.style.left = game.clientWidth + "px";
    game.appendChild(obstacle);
    obstacles.push(obstacle);
  }

  function updateObstacles() {
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const obs = obstacles[i];
      let x = parseFloat(obs.style.left);
      x -= gameSpeed;
      obs.style.left = x + "px";

      if (x + obs.offsetWidth < 0) {
        game.removeChild(obs);
        obstacles.splice(i, 1);
        score++;
        scoreEl.textContent = "Skor: " + score;
      }

      if (checkCollision(frog, obs)) {
        endGame();
      }
    }
  }

  function checkCollision(a, b) {
    const aRect = a.getBoundingClientRect();
    const bRect = b.getBoundingClientRect();
    return !(
      aRect.right < bRect.left ||
      aRect.left > bRect.right ||
      aRect.bottom < bRect.top ||
      aRect.top > bRect.bottom
    );
  }

  function jump() {
    if (!isJumping && !gameOver) {
      isJumping = true;
      velocityY = jumpStrength;
    }
  }

  function updateFrog() {
    if (isJumping) {
      frogY += velocityY;
      velocityY += gravity;

      if (frogY <= 0) {
        frogY = 0;
        isJumping = false;
      }
    }
    frog.style.transform = `translateY(${-frogY}px)`;
  }

  let obstacleTimer = 0;
  let obstacleInterval = 90;

  function gameLoop() {
    if (gameOver) return;

    updateFrog();
    updateObstacles();

    obstacleTimer++;
    if (obstacleTimer > obstacleInterval) {
      createObstacle();
      obstacleTimer = 0;

      if (score % 5 === 0 && score > 0) {
        gameSpeed += 0.3;
      }
    }

    requestAnimationFrame(gameLoop);
  }

  function endGame() {
    gameOver = true;
    messageText.textContent = "Katak terlanggar! Skor kamu: " + score;
    messageBox.style.display = "block";
  }

  function resetGame() {
    isJumping = false;
    velocityY = 0;
    frogY = 0;
    frog.style.transform = "translateY(0)";
    score = 0;
    gameSpeed = 3;
    scoreEl.textContent = "Skor: 0";
    gameOver = false;
    messageBox.style.display = "none";

    obstacles.forEach(o => game.removeChild(o));
    obstacles = [];

    obstacleTimer = 0;
    gameLoop();
  }

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      jump();
    }
  });

  game.addEventListener("click", jump);
  restartBtn.addEventListener("click", resetGame);

  gameLoop();
</script>

</body>
</html>
